spring:
  application:
    name: backend

  # Turns docker compose of - turn on if wanting to test local database and not Cloud
  docker:
    compose:
      enabled: false

  # docker:
    # compose:
      # file: backend/compose.yaml
      # lifecycle-management: start-and-stop # Automatically start/stop containers

    # Neo4j Database Configuration
  neo4j:
    uri: neo4j+s://6a80935a.databases.neo4j.io
    authentication:
      username: ${NEO4J_USER}
      password: ${NEO4J_PASSWORD}

    # GraphQL Configuration
  graphql:
    graphiql:
      enabled: true      # Enables the interactive editor at http://localhost:8080/graphiql
      path: /graphiql
    schema:
      printer:
        enabled: true

server:
  port: 8080

logging:
  level:
    org.springframework.data.neo4j: INFO
    org.springframework.web: INFO
    # Show me why Security is rejecting requests:
    org.springframework.security: DEBUG
    # Show me CORS decisions:
    org.springframework.web.cors: DEBUG
    org.springframework.web.servlet.handler.AbstractHandlerMapping: DEBUG